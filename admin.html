<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>湾水告示栏 - 内容管理</title>
    <!-- 字体：与 index.html 保持一致 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ========== 基础重置 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ========== 全局样式 ========== */
        body {
            font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', 'PingFang SC', 'Inter', 'Noto Sans SC', 'Helvetica Neue', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #e8f4f8 0%, #dceef5 30%, #e3f0f8 60%, #eaf3fa 100%);
            color: #1a3a4a;
            line-height: 1.6;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* ========== 管理后台容器 ========== */
        .admin-container {
            max-width: 720px;
            margin: 0 auto;
        }

        /* ========== 页头 ========== */
        .admin-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .admin-header h1 {
            font-size: 1.8rem;
            color: #1e5068;
            margin-bottom: 6px;
        }

        .admin-header p {
            color: #7a9ab0;
            font-size: 0.9rem;
        }

        .admin-header a {
            color: #6db3d4;
            text-decoration: none;
        }

        .admin-header a:hover {
            text-decoration: underline;
        }

        /* ========== 卡片样式（与 index.html 毛玻璃风格一致）========== */
        .admin-card {
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-radius: 20px;
            padding: 30px 28px;
            margin-bottom: 20px;
            box-shadow: 0 4px 28px rgba(78, 136, 180, 0.10), 0 0 0 1px rgba(180, 210, 235, 0.4);
        }

        .admin-card h2 {
            font-size: 1.3rem;
            color: #2c6080;
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 2px dashed #b8d8ec;
        }

        /* ========== 表单样式 ========== */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 0.88rem;
            font-weight: 600;
            color: #2c6080;
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid rgba(160, 200, 230, 0.5);
            border-radius: 12px;
            font-size: 0.9rem;
            font-family: inherit;
            color: #1a3a4a;
            background: rgba(255, 255, 255, 0.6);
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #6db3d4;
            box-shadow: 0 0 0 3px rgba(109, 179, 212, 0.15);
        }

        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }

        .form-group .hint {
            font-size: 0.75rem;
            color: #7a9ab0;
            margin-top: 4px;
        }

        /* ========== 按钮样式 ========== */
        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 16px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        /* 主按钮（保存） */
        .btn-primary {
            background: linear-gradient(135deg, #6db3d4, #8ecae6);
            color: #fff;
        }

        .btn-primary:hover {
            box-shadow: 0 4px 14px rgba(90, 156, 197, 0.35);
            transform: translateY(-1px);
        }

        /* 危险按钮（重置） */
        .btn-danger {
            background: rgba(224, 96, 96, 0.12);
            color: #c05050;
        }

        .btn-danger:hover {
            background: rgba(224, 96, 96, 0.2);
        }

        /* 次要按钮（预览） */
        .btn-secondary {
            background: rgba(78, 136, 180, 0.1);
            color: #2c6080;
        }

        .btn-secondary:hover {
            background: rgba(78, 136, 180, 0.18);
        }

        /* ========== 登录遮罩层 ========== */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(232, 244, 248, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        /* 登录弹窗 */
        .login-box {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(6px);
            border-radius: 20px;
            padding: 36px 32px;
            box-shadow: 0 4px 28px rgba(78, 136, 180, 0.15), 0 0 0 1px rgba(180, 210, 235, 0.4);
            text-align: center;
            max-width: 360px;
            width: 90%;
        }

        .login-box h2 {
            color: #1e5068;
            margin-bottom: 8px;
            font-size: 1.4rem;
        }

        .login-box p {
            color: #7a9ab0;
            font-size: 0.85rem;
            margin-bottom: 20px;
        }

        .login-box input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid rgba(160, 200, 230, 0.5);
            border-radius: 12px;
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 14px;
            outline: none;
            font-family: inherit;
        }

        .login-box input:focus {
            border-color: #6db3d4;
            box-shadow: 0 0 0 3px rgba(109, 179, 212, 0.15);
        }

        .login-error {
            color: #c05050;
            font-size: 0.8rem;
            margin-bottom: 10px;
            display: none;
        }

        /* ========== Toast 提示 ========== */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-80px);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(78, 136, 180, 0.2);
            font-size: 0.9rem;
            color: #2c6080;
            font-weight: 500;
            transition: transform 0.35s cubic-bezier(0.42, 0, 0.58, 1);
            z-index: 2000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* ========== 响应式布局（移动端 ≤700px）========== */
        @media (max-width: 700px) {
            body { padding: 20px 12px; }
            .admin-card { padding: 22px 18px; }
        }
    </style>
</head>
<body>

    <!-- ========== 登录遮罩 ========== -->
    <!-- 密码验证通过后隐藏，显示管理面板 -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2>管理后台</h2>
            <p>请输入管理密码</p>
            <input type="password" id="loginPassword" placeholder="输入密码" autocomplete="off">
            <div class="login-error" id="loginError">密码错误，请重试</div>
            <button class="btn btn-primary" id="loginBtn" style="width:100%;">进入管理</button>
        </div>
    </div>

    <!-- ========== 管理面板 ========== -->
    <!-- 登录成功后显示，包含所有可编辑字段 -->
    <div class="admin-container" id="adminPanel" style="display:none;">
        <div class="admin-header">
            <h1>内容管理后台</h1>
            <p><a href="index.html">← 返回告示栏</a></p>
        </div>

        <!-- 欢迎标题编辑卡片 -->
        <div class="admin-card">
            <h2>欢迎标题</h2>
            <div class="form-group">
                <label>中文标题</label>
                <input type="text" id="welcomeTitle" placeholder="欢迎来到湾水告示栏">
            </div>
            <div class="form-group">
                <label>英文标题</label>
                <input type="text" id="welcomeTitleEn" placeholder="Welcome to the Wanshui Briefing">
            </div>
        </div>

        <!-- 地铁告示栏编辑卡片 -->
        <div class="admin-card">
            <h2>地铁告示栏</h2>
            <div class="form-group">
                <label>更新日期</label>
                <input type="text" id="subwayDate" placeholder="2026/5/10">
            </div>
            <div class="form-group">
                <label>公告内容</label>
                <textarea id="subwayText" placeholder="输入地铁公告内容..."></textarea>
            </div>
        </div>

        <!-- 公交告示栏编辑卡片 -->
        <div class="admin-card">
            <h2>公交告示栏</h2>
            <div class="form-group">
                <label>更新日期</label>
                <input type="text" id="busDate" placeholder="2026/5/10">
            </div>
            <div class="form-group">
                <label>公告内容</label>
                <textarea id="busText" placeholder="输入公交公告内容..."></textarea>
            </div>
        </div>

        <!-- 轮播图片编辑卡片 -->
        <div class="admin-card">
            <h2>轮播图片</h2>
            <div class="form-group">
                <label>图片 1 URL</label>
                <input type="text" id="banner1" placeholder="background1.png 或图片链接">
                <div class="hint">可输入本地文件名或网络图片链接</div>
            </div>
            <div class="form-group">
                <label>图片 2 URL</label>
                <input type="text" id="banner2" placeholder="background2.png 或图片链接">
            </div>
            <div class="form-group">
                <label>图片 3 URL</label>
                <input type="text" id="banner3" placeholder="background3.png 或图片链接">
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="btn-row">
            <button class="btn btn-primary" id="saveBtn">保存修改</button>
            <button class="btn btn-secondary" id="previewBtn">预览效果</button>
            <button class="btn btn-danger" id="resetBtn">重置为默认</button>
        </div>
    </div>

    <!-- Toast 提示组件 -->
    <div class="toast" id="toast"></div>

    <!-- ========== 管理后台脚本 ========== -->
    <!-- 功能：密码验证、表单填充、保存到 localStorage、预览、重置 -->
    <script>
        (function() {
            // ---- 配置 ----
            // 管理密码（修改此处可更改后台密码）
            var ADMIN_PASSWORD = 'wanshui2026';
            // localStorage 存储键名（需与 index.html 一致）
            var STORAGE_KEY = 'wanbriefing_content';

            // ---- 默认值 ----
            // 重置时恢复的默认内容
            var defaults = {
                welcomeTitle: '欢迎来到湾水告示栏',
                welcomeTitleEn: 'Welcome to the Wanshui Briefing',
                subwayDate: '2026/5/10',
                subwayText: '我们重启了这个告示栏握手',
                busDate: '2026/5/10',
                busText: '我们重启了这个告示栏握手',
                banner1: 'background1.png',
                banner2: 'background2.png',
                banner3: 'background3.png'
            };

            // ---- DOM 元素引用 ----
            var loginOverlay = document.getElementById('loginOverlay');
            var loginPassword = document.getElementById('loginPassword');
            var loginBtn = document.getElementById('loginBtn');
            var loginError = document.getElementById('loginError');
            var adminPanel = document.getElementById('adminPanel');
            var toast = document.getElementById('toast');

            // ---- Toast 提示 ----
            function showToast(msg) {
                toast.textContent = msg;
                toast.classList.add('show');
                setTimeout(function() {
                    toast.classList.remove('show');
                }, 2500);
            }

            // ---- 从 localStorage 读取数据 ----
            function loadData() {
                var saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    try {
                        return JSON.parse(saved);
                    } catch (e) {
                        return {};
                    }
                }
                return {};
            }

            // ---- 填充表单（合并 localStorage 数据与默认值）----
            function populateForm() {
                var data = loadData();
                var merged = {};
                for (var key in defaults) {
                    merged[key] = data.hasOwnProperty(key) ? data[key] : defaults[key];
                }
                document.getElementById('welcomeTitle').value = merged.welcomeTitle;
                document.getElementById('welcomeTitleEn').value = merged.welcomeTitleEn;
                document.getElementById('subwayDate').value = merged.subwayDate;
                document.getElementById('subwayText').value = merged.subwayText;
                document.getElementById('busDate').value = merged.busDate;
                document.getElementById('busText').value = merged.busText;
                document.getElementById('banner1').value = merged.banner1;
                document.getElementById('banner2').value = merged.banner2;
                document.getElementById('banner3').value = merged.banner3;
            }

            // ---- 登录验证 ----
            function handleLogin() {
                var pwd = loginPassword.value;
                if (pwd === ADMIN_PASSWORD) {
                    loginOverlay.style.display = 'none';
                    adminPanel.style.display = 'block';
                    populateForm();
                } else {
                    loginError.style.display = 'block';
                    loginPassword.value = '';
                    loginPassword.focus();
                }
            }

            loginBtn.addEventListener('click', handleLogin);
            loginPassword.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') handleLogin();
            });

            // ---- 保存修改到 localStorage ----
            document.getElementById('saveBtn').addEventListener('click', function() {
                var data = {
                    welcomeTitle: document.getElementById('welcomeTitle').value,
                    welcomeTitleEn: document.getElementById('welcomeTitleEn').value,
                    subwayDate: document.getElementById('subwayDate').value,
                    subwayText: document.getElementById('subwayText').value,
                    busDate: document.getElementById('busDate').value,
                    busText: document.getElementById('busText').value,
                    banner1: document.getElementById('banner1').value,
                    banner2: document.getElementById('banner2').value,
                    banner3: document.getElementById('banner3').value
                };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                showToast('保存成功！');
            });

            // ---- 预览效果（先保存再打开 index.html）----
            document.getElementById('previewBtn').addEventListener('click', function() {
                document.getElementById('saveBtn').click();
                window.open('index.html', '_blank');
            });

            // ---- 重置为默认内容 ----
            document.getElementById('resetBtn').addEventListener('click', function() {
                if (confirm('确定要重置为默认内容吗？')) {
                    localStorage.removeItem(STORAGE_KEY);
                    populateForm();
                    showToast('已重置为默认内容');
                }
            });

            // 自动聚焦密码输入框
            loginPassword.focus();
        })();
    </script>

</body>
</html>
