<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>湾水告示栏</title>
    <!-- 字体：苹方(PingFang SC) + San Francisco(SF Pro) 优先，非 Apple 设备回退到 Inter + Noto Sans SC -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ========== 基础重置 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        /* ========== 全局样式 ========== */
        /* 字体优先级：SF Pro → PingFang SC → Inter → Noto Sans SC → 系统回退 */
        body {
            font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', 'PingFang SC', 'Inter', 'Noto Sans SC', 'Helvetica Neue', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #e8f4f8 0%, #dceef5 30%, #e3f0f8 60%, #eaf3fa 100%);
            color: #1a3a4a;
            line-height: 1.6;
            padding-top: 60px;
            min-height: 100vh;
        }

        /* ========== 顶部导航栏 ========== */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 2px 24px rgba(78, 136, 180, 0.12),
                        inset 0 0 0 1px rgba(255, 255, 255, 0.6);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 28px;
            z-index: 1000;
            flex-wrap: wrap;
            border-bottom: 1px solid rgba(160, 200, 230, 0.2);
        }

        .nav-logo {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .nav-logo img {
            width: 140px;
            height: auto;
            display: block;
            filter: drop-shadow(0 2px 6px rgba(40, 80, 110, 0.2));
        }

        /* 导航链接区域 */
        .nav-links {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .nav-links a {
            text-decoration: none;
            color: #3a6d8c;
            font-weight: 500;
            font-size: 0.95rem;
            padding: 7px 16px;
            border-radius: 20px;
            transition: all 0.25s ease;
            letter-spacing: 0.02em;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            background: rgba(255, 255, 255, 0.3);
        }

        .nav-links a:hover {
            background: linear-gradient(135deg, #6db3d4, #8ecae6);
            color: #fff;
            box-shadow: 0 4px 14px rgba(90, 156, 197, 0.35);
            transform: translateY(-1px);
        }

        /* ========== 轮播 Banner ========== */
        .banner {
            width: 100%;
            height: 380px;
            position: relative;
            overflow: hidden;
            margin-top: 0;
            background: rgba(0,0,0,0.02);
        }

        .slider-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: transform 0.7s cubic-bezier(0.42, 0, 0.58, 1);
            will-change: transform;
        }

        /* 轮播左右箭头 */
        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: none;
            border-radius: 50%;
            box-shadow: 0 4px 14px rgba(78, 136, 180, 0.15);
            font-size: 1.6rem;
            color: #2c6080;
            cursor: pointer;
            z-index: 20;
            transition: background 0.25s, transform 0.2s, box-shadow 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .arrow:hover {
            background: rgba(255,255,255,0.9);
            box-shadow: 0 6px 20px rgba(78, 136, 180, 0.25);
            transform: translateY(-50%) scale(1.05);
        }

        .arrow-left { left: 20px; }
        .arrow-right { right: 20px; }

        /* Banner 底部渐变遮罩 */
        .banner::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background: linear-gradient(to bottom, transparent, rgba(232, 244, 248, 0.5));
            pointer-events: none;
            z-index: 15;
        }

        /* ========== 内容模块卡片 ========== */
        .module {
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            max-width: 900px;
            margin: 30px auto;
            padding: 40px 36px;
            border-radius: 20px;
            box-shadow: 0 4px 28px rgba(78, 136, 180, 0.10), 0 0 0 1px rgba(180, 210, 235, 0.4);
            text-align: center;
            scroll-margin-top: 80px;
            transition: box-shadow 0.3s ease;
        }

        .module:hover {
            box-shadow: 0 8px 36px rgba(78, 136, 180, 0.16), 0 0 0 1px rgba(160, 200, 230, 0.55);
        }

        /* 欢迎标题模块 */
        .title-module h1 {
            font-size: 2.2rem;
            margin-bottom: 0.25em;
            color: #1e5068;
            font-weight: 700;
            letter-spacing: 0.03em;
        }

        /* 告示栏内容模块 */
        .body-module {
            text-align: left;
        }

        .body-module h2 {
            font-size: 1.8rem;
            color: #2c6080;
            border-bottom: 2px dashed #b8d8ec;
            padding-bottom: 0.25em;
            display: table;
            margin: 0 auto 0.6em auto;
            text-align: center;
            font-weight: 650;
            letter-spacing: 0.04em;
        }

        .body-module h3 {
            font-size: 1.3rem;
            color: #a3bcc8;
            font-style: italic;
            margin: 1.5em 0 0.8em;
            font-weight: 500;
        }

        .body-module .notice-text {
            font-size: 1.1rem;
            margin: 1.2em 0 0.8em;
            color: #2e5066;
        }

        /* ========== 页脚 ========== */
        .site-footer {
            text-align: center;
            color: #a3bcc8;
            font-size: 0.9rem;
            padding: 32px 20px;
            margin-top: 24px;
            background: transparent;
            letter-spacing: 0.04em;
            opacity: 0.85;
        }

        /* ========== 响应式布局（移动端 ≤700px）========== */
        @media (max-width: 700px) {
            body { padding-top: 110px; }
            .top-nav { padding: 10px 16px; gap: 10px; }
            .nav-logo img { width: 110px; }
            .nav-links a { font-size: 0.85rem; padding: 5px 12px; }
            .banner { height: 280px; }
            .arrow { width: 36px; height: 36px; font-size: 1.3rem; }
            .arrow-left { left: 8px; }
            .arrow-right { right: 8px; }
            .module { margin: 20px 12px; padding: 28px 20px; scroll-margin-top: 130px; }
            .title-module h1 { font-size: 1.6rem; }
            .body-module h2 { font-size: 1.5rem; }
        }

        /* ========== 音乐播放器 ========== */
        /* 播放器容器：默认全宽底部固定，minimized 模式为右下角胶囊 */
        .music-player {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 -2px 24px rgba(78, 136, 180, 0.12),
                        inset 0 0 0 1px rgba(255, 255, 255, 0.6);
            z-index: 999;
            transition: all 0.35s cubic-bezier(0.42, 0, 0.58, 1);
            border-top: 1px solid rgba(160, 200, 230, 0.2);
        }

        .music-player.minimized {
            width: auto;
            left: auto;
            right: 20px;
            bottom: 20px;
            border-radius: 28px;
            max-width: 200px;
        }

        /* 迷你模式行 */
        .player-mini {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            gap: 10px;
        }

        /* 展开模式容器 */
        .player-expanded {
            padding: 14px 20px 18px;
        }

        /* 展开模式：控制按钮行（上一首/播放/下一首 + 曲名 + 收起） */
        .player-expanded .player-controls-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        /* 播放器圆形按钮 */
        .player-btn {
            background: rgba(255, 255, 255, 0.5);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #2c6080;
            font-size: 1rem;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .player-btn:hover {
            background: linear-gradient(135deg, #6db3d4, #8ecae6);
            color: #fff;
            box-shadow: 0 4px 14px rgba(90, 156, 197, 0.35);
            transform: scale(1.08);
        }

        .player-btn.play-btn {
            width: 42px;
            height: 42px;
            font-size: 1.2rem;
        }

        /* 播放模式按钮（循环/随机） */
        .player-btn.mode-btn {
            font-size: 0.75rem;
            width: 30px;
            height: 30px;
        }

        .player-btn.mode-btn.active {
            background: linear-gradient(135deg, #6db3d4, #8ecae6);
            color: #fff;
        }

        /* 曲目名称 */
        .player-track-name {
            font-size: 0.85rem;
            color: #2c6080;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            min-width: 0;
            font-weight: 500;
        }

        /* 进度条行 */
        .player-progress-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .player-time {
            font-size: 0.72rem;
            color: #7a9ab0;
            min-width: 36px;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        .player-progress-bar {
            flex: 1;
            height: 4px;
            background: rgba(78, 136, 180, 0.15);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .player-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #6db3d4, #8ecae6);
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s linear;
            position: relative;
        }

        /* 进度条拖拽圆点（hover 时显示） */
        .player-progress-fill::after {
            content: '';
            position: absolute;
            right: -5px;
            top: 50%;
            transform: translateY(-50%);
            width: 10px;
            height: 10px;
            background: #fff;
            border: 2px solid #6db3d4;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .player-progress-bar:hover .player-progress-fill::after {
            opacity: 1;
        }

        /* 音量控制行 */
        .player-volume-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .player-volume-icon {
            font-size: 0.9rem;
            color: #7a9ab0;
            cursor: pointer;
            width: 20px;
            text-align: center;
        }

        .player-volume-bar {
            width: 80px;
            height: 4px;
            background: rgba(78, 136, 180, 0.15);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .player-volume-fill {
            height: 100%;
            background: linear-gradient(90deg, #6db3d4, #8ecae6);
            border-radius: 2px;
            width: 80%;
        }

        /* 上传音乐行 */
        .player-upload-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(160, 200, 230, 0.2);
        }

        .player-upload-btn {
            background: linear-gradient(135deg, #6db3d4, #8ecae6);
            color: #fff;
            border: none;
            border-radius: 16px;
            padding: 6px 16px;
            font-size: 0.8rem;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .player-upload-btn:hover {
            box-shadow: 0 4px 14px rgba(90, 156, 197, 0.35);
            transform: translateY(-1px);
        }

        /* 播放列表 */
        .player-playlist {
            max-height: 150px;
            overflow-y: auto;
            margin-top: 8px;
        }

        .player-playlist-item {
            display: flex;
            align-items: center;
            padding: 5px 8px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            color: #2c6080;
            transition: background 0.15s;
            gap: 6px;
        }

        .player-playlist-item:hover {
            background: rgba(78, 136, 180, 0.08);
        }

        .player-playlist-item.active {
            background: rgba(78, 136, 180, 0.12);
            font-weight: 600;
        }

        .player-playlist-item .item-index {
            color: #7a9ab0;
            min-width: 18px;
            font-size: 0.72rem;
        }

        .player-playlist-item .item-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* 仓库音乐标记图标 */
        .player-playlist-item .item-source {
            font-size: 0.65rem;
            color: #6db3d4;
            flex-shrink: 0;
        }

        .player-playlist-item .item-remove {
            color: #b0c4d0;
            cursor: pointer;
            font-size: 0.85rem;
            padding: 0 4px;
            transition: color 0.15s;
        }

        .player-playlist-item .item-remove:hover {
            color: #e06060;
        }

        /* 展开/收起按钮 */
        .player-toggle-btn {
            background: none;
            border: none;
            color: #7a9ab0;
            cursor: pointer;
            font-size: 0.85rem;
            padding: 4px;
            transition: color 0.15s;
        }

        .player-toggle-btn:hover {
            color: #2c6080;
        }

        .player-file-input {
            display: none;
        }

        .player-empty {
            text-align: center;
            padding: 8px;
            color: #7a9ab0;
            font-size: 0.8rem;
        }

        /* 为播放器预留底部空间 */
        body {
            padding-bottom: 70px;
        }

        /* 播放器移动端适配 */
        @media (max-width: 700px) {
            .music-player.minimized {
                right: 12px;
                bottom: 12px;
                max-width: 160px;
            }
            .player-btn { width: 32px; height: 32px; font-size: 0.9rem; }
            .player-btn.play-btn { width: 38px; height: 38px; font-size: 1.1rem; }
            .player-btn.mode-btn { width: 28px; height: 28px; font-size: 0.7rem; }
            .player-expanded { padding: 10px 14px 14px; }
            .player-volume-bar { width: 60px; }
            body { padding-bottom: 60px; }
        }
    </style>
</head>
<body>

    <!-- ========== 顶部导航栏 ========== -->
    <nav class="top-nav">
        <a href="https://fennmoo.github.io/wanbriefing/" class="nav-logo">
            <img src="wanshuigaoshilan.png" alt="湾水集团图片">
        </a>
        <div class="nav-links">
            <a href="#welcome">欢迎标题</a>
            <a href="#subway">地铁告示栏</a>
            <a href="#bus">公交告示栏</a>
            <a href="admin.html">管理后台</a>
        </div>
    </nav>

    <!-- ========== 轮播 Banner ========== -->
    <div class="banner" id="banner">
        <div class="slider-container" id="sliderContainer"></div>
        <button class="arrow arrow-left" id="prevBtn">‹</button>
        <button class="arrow arrow-right" id="nextBtn">›</button>
    </div>

    <!-- ========== 欢迎标题模块 ========== -->
    <div class="module title-module" id="welcome">
        <h1 id="welcomeTitleZh">欢迎来到湾水告示栏</h1>
        <h1 id="welcomeTitleEn">Welcome to the Wanshui Briefing</h1>
    </div>

    <!-- ========== 地铁告示栏模块 ========== -->
    <div class="module body-module" id="subway">
        <h2>地铁告示栏</h2>
        <h3 id="subwayDate">更新日期：2026/5/10</h3>
        <p class="notice-text" id="subwayText">我们重启了这个告示栏握手</p>
    </div>

    <!-- ========== 公交告示栏模块 ========== -->
    <div class="module body-module" id="bus">
        <h2>公交告示栏</h2>
        <h3 id="busDate">更新日期：2026/5/10</h3>
        <p class="notice-text" id="busText">我们重启了这个告示栏握手</p>
    </div>

    <!-- ========== 页脚 ========== -->
    <footer class="site-footer">
        湾水湾水湾水湾水湾水湾水湾水湾水湾水湾水湾水湾水湾水湾水湾水湾水湾水湾水
    </footer>

    <!-- ========== 音乐播放器 ========== -->
    <!-- 迷你模式：右下角胶囊（播放/暂停 + 曲名 + 展开） -->
    <!-- 展开模式：完整控件（切歌 + 进度 + 音量 + 播放模式 + 播放列表） -->
    <div class="music-player minimized" id="musicPlayer">
        <!-- 迷你模式 -->
        <div class="player-mini" id="playerMini">
            <button class="player-btn play-btn" id="miniPlayBtn" title="播放/暂停">▶</button>
            <span class="player-track-name" id="miniTrackName">点击播放音乐</span>
            <button class="player-toggle-btn" id="expandBtn" title="展开">⬆</button>
        </div>
        <!-- 展开模式 -->
        <div class="player-expanded" id="playerExpanded" style="display:none;">
            <!-- 控制按钮行：上一首 | 播放/暂停 | 下一首 | 曲名 | 播放模式 | 收起 -->
            <div class="player-controls-row">
                <button class="player-btn" id="prevTrackBtn" title="上一首">⏮</button>
                <button class="player-btn play-btn" id="playBtn" title="播放/暂停">▶</button>
                <button class="player-btn" id="nextTrackBtn" title="下一首">⏭</button>
                <span class="player-track-name" id="trackName">未选择音乐</span>
                <button class="player-btn mode-btn" id="modeBtn" title="播放模式：顺序播放">↻</button>
                <button class="player-toggle-btn" id="collapseBtn" title="收起">⬇</button>
            </div>
            <!-- 进度条行 -->
            <div class="player-progress-row">
                <span class="player-time" id="currentTime">0:00</span>
                <div class="player-progress-bar" id="progressBar">
                    <div class="player-progress-fill" id="progressFill"></div>
                </div>
                <span class="player-time" id="totalTime">0:00</span>
            </div>
            <!-- 音量控制行 -->
            <div class="player-volume-row">
                <span class="player-volume-icon" id="volumeIcon">🔊</span>
                <div class="player-volume-bar" id="volumeBar">
                    <div class="player-volume-fill" id="volumeFill"></div>
                </div>
            </div>
            <!-- 上传音乐行 -->
            <div class="player-upload-row">
                <button class="player-upload-btn" id="uploadBtn">添加音乐</button>
                <input type="file" class="player-file-input" id="fileInput" accept="audio/*" multiple>
                <span class="player-track-name" id="uploadHint" style="font-size:0.75rem;color:#7a9ab0;">支持 MP3、WAV、OGG、FLAC</span>
            </div>
            <!-- 播放列表 -->
            <div class="player-playlist" id="playlist"></div>
        </div>
    </div>

    <!-- ========== 脚本1：从 localStorage 读取后台管理的内容 ========== -->
    <script>
        (function() {
            var STORAGE_KEY = 'wanbriefing_content';
            var saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    var data = JSON.parse(saved);
                    if (data.welcomeTitle) document.getElementById('welcomeTitleZh').textContent = data.welcomeTitle;
                    if (data.welcomeTitleEn) document.getElementById('welcomeTitleEn').textContent = data.welcomeTitleEn;
                    if (data.subwayDate) document.getElementById('subwayDate').textContent = '更新日期：' + data.subwayDate;
                    if (data.subwayText) document.getElementById('subwayText').textContent = data.subwayText;
                    if (data.busDate) document.getElementById('busDate').textContent = '更新日期：' + data.busDate;
                    if (data.busText) document.getElementById('busText').textContent = data.busText;
                } catch (e) {}
            }
        })();
    </script>

    <!-- ========== 脚本2：轮播 Banner ========== -->
    <script>
        (function() {
            var STORAGE_KEY = 'wanbriefing_content';
            var saved = localStorage.getItem(STORAGE_KEY);
            var customImages = null;
            if (saved) {
                try {
                    var data = JSON.parse(saved);
                    if (data.banner1 || data.banner2 || data.banner3) {
                        customImages = [];
                        customImages.push(data.banner1 || 'background1.png');
                        customImages.push(data.banner2 || 'background2.png');
                        customImages.push(data.banner3 || 'background3.png');
                    }
                } catch (e) {}
            }
            var images = customImages || [
                'background1.png',
                'background2.png',
                'background3.png'
            ];

            var container = document.getElementById('sliderContainer');
            var prevBtn = document.getElementById('prevBtn');
            var nextBtn = document.getElementById('nextBtn');

            var slide1 = document.createElement('div');
            var slide2 = document.createElement('div');
            slide1.className = 'slide';
            slide2.className = 'slide';
            container.appendChild(slide1);
            container.appendChild(slide2);

            var currentIndex = 0;
            var activeSlide = slide1;
            var nextSlide = slide2;
            var autoTimer = null;
            var pauseTimer = null;
            var autoInterval = 6000;
            var pauseAfterManual = 10000;
            var isAnimating = false;

            function setBg(el, imgSrc) {
                el.style.backgroundImage = "url('" + imgSrc + "')";
            }

            function initSlides() {
                setBg(activeSlide, images[0]);
                activeSlide.style.transform = 'translateX(0)';
                var nextIdx = (currentIndex + 1) % images.length;
                setBg(nextSlide, images[nextIdx]);
                nextSlide.style.transform = 'translateX(100%)';
            }

            function slideToNext() {
                if (isAnimating) return;
                isAnimating = true;
                activeSlide.style.transform = 'translateX(-100%)';
                nextSlide.style.transform = 'translateX(0)';
                var onFinish = function() {
                    activeSlide.removeEventListener('transitionend', onFinish);
                    activeSlide.style.transition = 'none';
                    activeSlide.style.transform = 'translateX(100%)';
                    currentIndex = (currentIndex + 1) % images.length;
                    setBg(activeSlide, images[(currentIndex + 1) % images.length]);
                    void activeSlide.offsetWidth;
                    activeSlide.style.transition = '';
                    var tmp = activeSlide; activeSlide = nextSlide; nextSlide = tmp;
                    isAnimating = false;
                };
                activeSlide.addEventListener('transitionend', onFinish);
            }

            function slideToPrev() {
                if (isAnimating) return;
                isAnimating = true;
                var prevIdx = (currentIndex - 1 + images.length) % images.length;
                nextSlide.style.transition = 'none';
                setBg(nextSlide, images[prevIdx]);
                nextSlide.style.transform = 'translateX(-100%)';
                void nextSlide.offsetWidth;
                nextSlide.style.transition = '';
                activeSlide.style.transform = 'translateX(100%)';
                nextSlide.style.transform = 'translateX(0)';
                var onFinish = function() {
                    activeSlide.removeEventListener('transitionend', onFinish);
                    activeSlide.style.transition = 'none';
                    activeSlide.style.transform = 'translateX(-100%)';
                    currentIndex = prevIdx;
                    setBg(activeSlide, images[(currentIndex + 1) % images.length]);
                    void activeSlide.offsetWidth;
                    activeSlide.style.transition = '';
                    var tmp = activeSlide; activeSlide = nextSlide; nextSlide = tmp;
                    isAnimating = false;
                };
                activeSlide.addEventListener('transitionend', onFinish);
            }

            function startAuto() { stopAuto(); autoTimer = setInterval(slideToNext, autoInterval); }
            function stopAuto() { if (autoTimer) { clearInterval(autoTimer); autoTimer = null; } }
            function resetPause() {
                if (pauseTimer) clearTimeout(pauseTimer);
                stopAuto();
                pauseTimer = setTimeout(function() { pauseTimer = null; startAuto(); }, pauseAfterManual);
            }

            prevBtn.addEventListener('click', function() { slideToPrev(); resetPause(); });
            nextBtn.addEventListener('click', function() { slideToNext(); resetPause(); });

            initSlides();
            startAuto();
        })();
    </script>

    <!-- ========== 脚本3：音乐播放器 ========== -->
    <!-- 功能：仓库预置音乐 + 本地上传 + 播放/暂停 + 上一首/下一首 + 进度拖拽 + 音量 + 播放模式（顺序/单曲循环/随机） -->
    <script>
        (function() {
            var audio = new Audio();
            var playlist = [];
            var currentIndex = -1;
            var isPlaying = false;

            var playModes = ['sequential', 'single', 'shuffle'];
            var playModeLabels = { sequential: '↻', single: '🔂', shuffle: '⇄' };
            var playModeTitles = { sequential: '顺序播放', single: '单曲循环', shuffle: '随机播放' };
            var savedMode = localStorage.getItem('playerMode');
            var currentModeIndex = playModes.indexOf(savedMode) >= 0 ? playModes.indexOf(savedMode) : 0;

            var savedVolume = localStorage.getItem('playerVolume');
            audio.volume = savedVolume !== null ? parseFloat(savedVolume) : 0.8;

            var player = document.getElementById('musicPlayer');
            var playerMini = document.getElementById('playerMini');
            var playerExpanded = document.getElementById('playerExpanded');
            var miniPlayBtn = document.getElementById('miniPlayBtn');
            var miniTrackName = document.getElementById('miniTrackName');
            var expandBtn = document.getElementById('expandBtn');
            var collapseBtn = document.getElementById('collapseBtn');
            var playBtn = document.getElementById('playBtn');
            var prevTrackBtn = document.getElementById('prevTrackBtn');
            var nextTrackBtn = document.getElementById('nextTrackBtn');
            var trackName = document.getElementById('trackName');
            var modeBtn = document.getElementById('modeBtn');
            var currentTimeEl = document.getElementById('currentTime');
            var totalTimeEl = document.getElementById('totalTime');
            var progressBar = document.getElementById('progressBar');
            var progressFill = document.getElementById('progressFill');
            var volumeIcon = document.getElementById('volumeIcon');
            var volumeBar = document.getElementById('volumeBar');
            var volumeFill = document.getElementById('volumeFill');
            var uploadBtn = document.getElementById('uploadBtn');
            var fileInput = document.getElementById('fileInput');
            var playlistEl = document.getElementById('playlist');

            volumeFill.style.width = (audio.volume * 100) + '%';
            updateVolumeIcon();
            updateModeBtn();

            var repoMusic = [
                { name: '罗大佑 - 首都', url: '08. 罗大佑 - 首都.mp3' },
                { name: 'audio (6)', url: 'audio (6).wav' }
            ];
            repoMusic.forEach(function(track) {
                playlist.push({ name: track.name, url: track.url, isLocal: false });
            });
            updateTrackDisplay();

            function formatTime(sec) {
                if (!sec || isNaN(sec)) return '0:00';
                var m = Math.floor(sec / 60);
                var s = Math.floor(sec % 60);
                return m + ':' + (s < 10 ? '0' : '') + s;
            }

            function updateVolumeIcon() {
                if (audio.muted || audio.volume === 0) volumeIcon.textContent = '🔇';
                else if (audio.volume < 0.5) volumeIcon.textContent = '🔉';
                else volumeIcon.textContent = '🔊';
            }

            function updateTrackDisplay() {
                var name = currentIndex >= 0 ? playlist[currentIndex].name : '未选择音乐';
                trackName.textContent = name;
                miniTrackName.textContent = currentIndex >= 0 ? name : '点击播放音乐';
            }

            function updatePlayButtons() {
                var icon = isPlaying ? '⏸' : '▶';
                playBtn.textContent = icon;
                miniPlayBtn.textContent = icon;
            }

            function updateModeBtn() {
                var mode = playModes[currentModeIndex];
                modeBtn.textContent = playModeLabels[mode];
                modeBtn.title = '播放模式：' + playModeTitles[mode];
                if (mode === 'single') {
                    modeBtn.classList.add('active');
                } else {
                    modeBtn.classList.remove('active');
                }
            }

            function renderPlaylist() {
                playlistEl.innerHTML = '';
                if (playlist.length === 0) {
                    playlistEl.innerHTML = '<div class="player-empty">暂无音乐，请点击添加</div>';
                    return;
                }
                playlist.forEach(function(track, i) {
                    var item = document.createElement('div');
                    item.className = 'player-playlist-item' + (i === currentIndex ? ' active' : '');
                    var sourceTag = track.isLocal ? '' : '<span class="item-source">☁</span>';
                    item.innerHTML = '<span class="item-index">' + (i + 1) + '</span>' +
                        '<span class="item-name">' + track.name + '</span>' +
                        sourceTag +
                        '<span class="item-remove" data-index="' + i + '">×</span>';
                    item.addEventListener('click', function(e) {
                        if (e.target.classList.contains('item-remove')) {
                            removeTrack(parseInt(e.target.dataset.index));
                            return;
                        }
                        playTrack(i);
                    });
                    playlistEl.appendChild(item);
                });
            }

            function playTrack(index) {
                if (index < 0 || index >= playlist.length) return;
                currentIndex = index;
                audio.src = playlist[index].url;
                audio.play().catch(function() {});
                isPlaying = true;
                updatePlayButtons();
                updateTrackDisplay();
                renderPlaylist();
            }

            function togglePlay() {
                if (playlist.length === 0) {
                    fileInput.click();
                    return;
                }
                if (currentIndex < 0) {
                    playTrack(0);
                    return;
                }
                if (isPlaying) {
                    audio.pause();
                    isPlaying = false;
                } else {
                    audio.play().catch(function() {});
                    isPlaying = true;
                }
                updatePlayButtons();
            }

            function getNextIndex() {
                var mode = playModes[currentModeIndex];
                if (mode === 'single') return currentIndex;
                if (mode === 'shuffle') {
                    if (playlist.length <= 1) return 0;
                    var next;
                    do { next = Math.floor(Math.random() * playlist.length); } while (next === currentIndex);
                    return next;
                }
                return (currentIndex + 1) % playlist.length;
            }

            function getPrevIndex() {
                var mode = playModes[currentModeIndex];
                if (mode === 'single') return currentIndex;
                if (mode === 'shuffle') {
                    if (playlist.length <= 1) return 0;
                    var prev;
                    do { prev = Math.floor(Math.random() * playlist.length); } while (prev === currentIndex);
                    return prev;
                }
                return (currentIndex - 1 + playlist.length) % playlist.length;
            }

            function removeTrack(index) {
                if (playlist[index].isLocal) {
                    URL.revokeObjectURL(playlist[index].url);
                }
                playlist.splice(index, 1);
                if (playlist.length === 0) {
                    audio.pause();
                    audio.src = '';
                    currentIndex = -1;
                    isPlaying = false;
                    updatePlayButtons();
                    updateTrackDisplay();
                } else if (index === currentIndex) {
                    currentIndex = Math.min(currentIndex, playlist.length - 1);
                    playTrack(currentIndex);
                } else if (index < currentIndex) {
                    currentIndex--;
                }
                renderPlaylist();
            }

            miniPlayBtn.addEventListener('click', togglePlay);
            playBtn.addEventListener('click', togglePlay);

            prevTrackBtn.addEventListener('click', function() {
                if (playlist.length === 0) return;
                playTrack(getPrevIndex());
            });

            nextTrackBtn.addEventListener('click', function() {
                if (playlist.length === 0) return;
                playTrack(getNextIndex());
            });

            modeBtn.addEventListener('click', function() {
                currentModeIndex = (currentModeIndex + 1) % playModes.length;
                localStorage.setItem('playerMode', playModes[currentModeIndex]);
                updateModeBtn();
            });

            expandBtn.addEventListener('click', function() {
                player.classList.remove('minimized');
                playerMini.style.display = 'none';
                playerExpanded.style.display = 'block';
            });

            collapseBtn.addEventListener('click', function() {
                player.classList.add('minimized');
                playerMini.style.display = 'flex';
                playerExpanded.style.display = 'none';
            });

            uploadBtn.addEventListener('click', function() { fileInput.click(); });

            fileInput.addEventListener('change', function(e) {
                var files = e.target.files;
                for (var i = 0; i < files.length; i++) {
                    var file = files[i];
                    if (file.type.startsWith('audio/')) {
                        playlist.push({
                            name: file.name.replace(/\.[^.]+$/, ''),
                            url: URL.createObjectURL(file),
                            isLocal: true
                        });
                    }
                }
                fileInput.value = '';
                renderPlaylist();
                if (currentIndex < 0 && playlist.length > 0) {
                    updateTrackDisplay();
                }
            });

            audio.addEventListener('timeupdate', function() {
                if (!audio.duration) return;
                var pct = (audio.currentTime / audio.duration) * 100;
                progressFill.style.width = pct + '%';
                currentTimeEl.textContent = formatTime(audio.currentTime);
            });

            audio.addEventListener('loadedmetadata', function() {
                totalTimeEl.textContent = formatTime(audio.duration);
            });

            audio.addEventListener('ended', function() {
                if (playlist.length > 1 || playModes[currentModeIndex] === 'single') {
                    playTrack(getNextIndex());
                } else {
                    isPlaying = false;
                    updatePlayButtons();
                    progressFill.style.width = '0%';
                    currentTimeEl.textContent = '0:00';
                }
            });

            progressBar.addEventListener('click', function(e) {
                if (!audio.duration) return;
                var rect = progressBar.getBoundingClientRect();
                var pct = (e.clientX - rect.left) / rect.width;
                audio.currentTime = pct * audio.duration;
            });

            volumeBar.addEventListener('click', function(e) {
                var rect = volumeBar.getBoundingClientRect();
                var pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
                audio.volume = pct;
                audio.muted = false;
                volumeFill.style.width = (pct * 100) + '%';
                updateVolumeIcon();
                localStorage.setItem('playerVolume', pct.toString());
            });

            volumeIcon.addEventListener('click', function() {
                audio.muted = !audio.muted;
                volumeFill.style.width = audio.muted ? '0%' : (audio.volume * 100) + '%';
                updateVolumeIcon();
            });

            renderPlaylist();
        })();
    </script>

</body>
</html>
