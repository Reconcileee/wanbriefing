<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>湾水告示栏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background-color: #F5F5DC;
            color: #000;
            line-height: 1.6;
        }

        .banner {
            width: 100%;
            height: 300px;
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
        }

        .logo-link {
            position: absolute;
            top: 20px;
            left: 20px;
            display: inline-block;
            text-decoration: none;
            z-index: 10;
        }

        .logo-link img {
            width: 280px;
            height: auto;
            display: block;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.3));
        }

        .content {
            background-color: #ffffff;
            max-width: 900px;
            margin: 40px auto;
            padding: 40px 30px;
            border-radius: 18px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            text-align: center;
        }

        .content h1 {
            font-size: 2.2rem;
            margin-bottom: 0.3em;
            color: #2c3e50;
        }

        .content h2 {
            font-size: 1.8rem;
            margin: 1.5em 0 0.5em;
            color: #3a5a40;
            border-bottom: 2px dashed #ccc;
            display: inline-block;
            padding-bottom: 0.2em;
        }

        .content h3 {
            font-size: 1.3rem;
            color: #5f6b7a;
            margin-bottom: 1.2em;
        }

        .content p {
            font-size: 1.1rem;
            margin: 0.8em 0;
        }

        .white-text {
            color: #7f8c8d;
            font-size: 0.95rem;
            margin-top: 2em;
        }

        @media (max-width: 600px) {
            .banner {
                height: 200px;
            }
            .logo-link img {
                width: 180px;
            }
            .content {
                margin: 20px 12px;
                padding: 25px 18px;
            }
            .content h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>

    <div class="banner">
        <a href="https://fennmoo.github.io/wanbriefing/" class="logo-link">
            <img src="wanshuijituan.png" alt="湾水集团图片">
        </a>
    </div>

    <div class="content">
        <h1>欢迎来到湾水告示栏</h1>
        <h1>Welcome to the Wanshui Briefing</h1>

        <br>
        <h2>湾水交通告示栏</h2>
        <h3>日期：2026/5/10</h3>
        <p>我们重启了这个告示栏握手</p>

        <br>
        <p class="white-text">湾水湾水湾水湾水湾水湾水湾水湾水湾水湾水湾水湾水湾水湾水湾水湾水湾水湾水</p>
    </div>

</body>
</html>
